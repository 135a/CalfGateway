server:
  port: 8090
  read_timeout: 30s
  write_timeout: 30s
  grace_period: 15s

proxy:
  max_idle_conns: 100
  max_idle_conns_per_host: 100
  max_conns_per_host: 0

auth:
  enabled: false
  secret: ""
  public_paths:
    - /health
    - /v1/auth/login

rate_limit:
    enabled: false
    global:
      rate: 50
      burst: 100
    per_client:
      rate: 10
      burst: 20

degradation:
  enabled: false
  strategy: static_response
  static_response:
    status_code: 200
    headers:
      Content-Type: application/json
    body: '{"code":503,"message":"service degraded","data":null}'
  cache:
    ttl: 60s
    max_entries: 10000
    cacheable_statuses: [200]
  # 全局 QPS 统计窗口（对所有路由生效）
  qps_window:
    size: 10s
    bucket_count: 10
  # 错误率统计窗口默认值（路由可各自覆盖）
  error_window:
    size: 10s
    bucket_count: 10

routes:
  - name: service-v1
    path: /v1/*path
    strip_prefix: /v1
    target: http://localhost:8080
    methods: []
    rate_limit:
      enabled: false
      global:
        rate: 50
        burst: 100
      per_client:
        rate: 10
        burst: 20
    breaker:
      enabled: false
      error_threshold_count: 5
      error_threshold_percentage: 0.5
      interval: 10s
      timeout: 30s
      max_requests: 3
    degradation:
      enabled: true
      strategy: static_response
      # 自动降级阈值：任一指标超阈值即降级（0 表示不启用该项）
      cpu_threshold: 80          # 单核 CPU 利用率 > 80%
      qps_threshold: 1000        # 全局 QPS > 1000
      error_rate_threshold: 0.5  # 本路由错误率 > 50%
      error_window:
        size: 10s
        bucket_count: 10
      static_response:
        status_code: 200
        headers:
          Content-Type: application/json
        body: '{"code":503,"message":"service-v1 degraded","data":null}'

  - name: service-v2
    path: /v2/*path
    strip_prefix: /v2
    target: http://localhost:8082
    methods: []
    breaker:
      enabled: true
      error_threshold_count: 5
      error_threshold_percentage: 0.5
      interval: 10s
      timeout: 30s
      max_requests: 3
    degradation:
      enabled: true
      strategy: static_response
      # 自动降级阈值（与熔断兜底降级共用同一策略）
      cpu_threshold: 90
      qps_threshold: 2000
      error_rate_threshold: 0.6
      error_window:
        size: 10s
        bucket_count: 10
      static_response:
        status_code: 200
        headers:
          Content-Type: application/json
        body: '{"code":503,"message":"service-v2 degraded","data":null}'
