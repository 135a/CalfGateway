server:
  port: 8090
  read_timeout: 30s
  write_timeout: 30s
  grace_period: 15s

proxy:
  max_idle_conns: 100
  max_idle_conns_per_host: 100
  max_conns_per_host: 0

auth:
  enabled: false
  secret: ""
  public_paths:
    - /health
    - /v1/auth/login

rate_limit:
    enabled: false
    global:
      rate: 50
      burst: 100
    per_client:
      rate: 10
      burst: 20

degradation:
  enabled: false
  strategy: static_response
  static_response:
    status_code: 200
    headers:
      Content-Type: application/json
    body: '{"code":503,"message":"service degraded","data":null}'
  qps_window:
    size: 10s
    bucket_count: 10
  error_window:
    size: 10s
    bucket_count: 10

routes:
  - name: service-v1
    path: /v1/*path
    strip_prefix: /v1
    target: http://localhost:8080
    methods: []
    rate_limit:
      enabled: false
      global:
        rate: 50
        burst: 100
      per_client:
        rate: 10
        burst: 20
    breaker:
      enabled: false
      error_threshold_count: 5
      error_threshold_percentage: 0.5
      interval: 10s
      timeout: 30s
      max_requests: 3
    degradation:
      enabled: true
      strategy: static_response
      cpu_threshold: 80
      qps_threshold: 1000
      error_rate_threshold: 0.5
      error_window:
        size: 10s
        bucket_count: 10
      static_response:
        status_code: 200
        headers:
          Content-Type: application/json
        body: '{"code":503,"message":"service-v1 degraded","data":null}'

  - name: service-v2
    path: /v2/*path
    strip_prefix: /v2
    target: http://localhost:8082
    methods: []
    breaker:
      enabled: true
      error_threshold_count: 5
      error_threshold_percentage: 0.5
      interval: 10s
      timeout: 30s
      max_requests: 3
