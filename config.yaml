server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  grace_period: 15s

auth:
  enabled: false
  secret: ""
  public_paths:
    - /health

rate_limit:
  enabled: true
  rate: 100
  burst: 200

routes:
  - name: service-v1
    path: /v1/*
    strip_prefix: /v1
    target: http://localhost:8081
    methods: []
    rate_limit:
      enabled: true
      rate: 50
      burst: 100
    breaker:
      enabled: false

  - name: service-v2
    path: /v2/*
    strip_prefix: /v2
    target: http://localhost:8082
    methods: []
    breaker:
      enabled: false
