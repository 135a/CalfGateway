server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  grace_period: 15s

auth:
  enabled: false
  secret: ""
  public_paths:
    - /health
    - /v1/auth/login

rate_limit:
    enabled: true
    global:
      rate: 50
      burst: 100
    per_client:
      rate: 10
      burst: 20

routes:
  - name: service-v1
    path: /v1/*
    strip_prefix: /v1
    target: http://localhost:8081
    methods: []
    rate_limit:
      enabled: true
      global:
        rate: 50
        burst: 100
      per_client:
        rate: 10
        burst: 20
    breaker:
      enabled: true
      error_threshold_count: 5
      error_threshold_percentage: 0.5
      interval: 10s
      timeout: 30s
      max_requests: 3

  - name: service-v2
    path: /v2/*
    strip_prefix: /v2
    target: http://localhost:8082
    methods: []
    breaker:
      enabled: true
      error_threshold_count: 5
      error_threshold_percentage: 0.5
      interval: 10s
      timeout: 30s
      max_requests: 3
