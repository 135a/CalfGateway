server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  grace_period: 15s

auth:
  enabled: false
  secret: ""
  public_paths:
    - /health

rate_limit:
  enabled: false
  global:
    rate: 100
    burst: 200
  per_client:
    rate: 10
    burst: 20

routes:
  - name: service-v1
    path: /v1/*
    strip_prefix: /v1
    target: http://localhost:8081
    methods: []
    rate_limit:
      enabled: true
      global:
        rate: 50
        burst: 100
    breaker:
      enabled: false

  - name: service-v2
    path: /v2/*
    strip_prefix: /v2
    target: http://localhost:8082
    methods: []
    rate_limit:
      enabled: true
      global:
        rate: 20
        burst: 40
    breaker:
      enabled: false
